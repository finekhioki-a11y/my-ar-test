<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>最先端AR印刷サンプル</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #ar-link-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 0; /* 上下の幅を少し広げました */
            background-color: #00cc66; /* 鮮やかな緑色 */
            color: white;
            font-size: 20px; /* 文字を少し大きくしました */
            font-weight: bold;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            
            /* 🔥 ここが重要：AR画面よりも絶対に手前に表示させる魔法の数字です */
            z-index: 999999 !important; 
            
            display: none; /* 最初は隠します */
            text-decoration: none;
            font-family: sans-serif;
            text-align: center;
            width: 80%; /* 押しやすいように横幅を広くしました */
        }
        #ar-link-button:active {
            background-color: #009944;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="ar-video" src="hotelfine_rentalcatalog_teaser2026.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <a-video src="#ar-video" width="1.6" height="0.9" position="0 0 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </scene>

    <a id="ar-link-button" href="https://www.hotel-fine.co.jp/member/rental/book/#target/page_no=1" target="_blank" rel="noopener noreferrer">📄 カタログページを開く</a>

    <script>
        const marker = document.getElementById('marker');
        const video = document.getElementById('ar-video');
        const button = document.getElementById('ar-link-button');
        let isMarkerFound = false;

        // マーカーを検知したとき
        marker.addEventListener('markerFound', () => {
            isMarkerFound = true;
            video.play().catch(err => { console.log("自動再生ブロック中"); });
            button.style.display = 'block'; // 🔥 ここでボタンを強制表示！
        });

        // マーカーが外れたとき
        marker.addEventListener('markerLost', () => {
            isMarkerFound = false;
            video.pause();
            button.style.display = 'none'; // 🔥 ここでボタンを隠す！
        });

        // 画面のどこかをタップしたら動画の再生ブロックを解除
        document.body.addEventListener('click', (e) => {
            if(e.target.id !== 'ar-link-button') {
                video.play();
            }
        });
    </script>
</body>
</html>
