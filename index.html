<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <script>
        const PAGE_TITLE = "HOTEL FINE RENTAL"; 
        const BUTTON_TEXT = "カタログを開く"; 
    </script>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    
    <style>
        #ar-link-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 0;
            background-color: #00cc66;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 999999 !important; 
            display: block !important; 
            text-decoration: none;
            font-family: sans-serif;
            text-align: center;
            width: 80%;
        }
        #ar-link-button:active {
            background-color: #009944;
        }
        /* 指操作用の透明なタッチエリア */
        #touch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            touch-action: none;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="touch-overlay"></div>

    <a-scene vr-mode-ui="enabled: false">
        <a-assets>
            <video id="ar-video" src="hotelfine_rentalcatalog_teaser2026.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-entity id="video-container" position="0 0 -2.5" rotation="0 0 0" scale="1 1 1">
            <a-video id="ar-video-plane" src="#ar-video" width="2.4" height="1.35"></a-video>
        </a-entity>

        <a-entity camera></a-entity>
    </scene>

    <a id="ar-link-button" href="https://www.hotel-fine.co.jp/member/rental/book/#target/page_no=1" target="_blank" rel="noopener noreferrer"></a>

    <script>
        document.title = PAGE_TITLE;
        const button = document.getElementById('ar-link-button');
        button.textContent = BUTTON_TEXT;

        const video = document.getElementById('ar-video');
        const videoContainer = document.getElementById('video-container');
        const overlay = document.getElementById('touch-overlay');

        // スマホのカメラ映像を背景として強制的に起動させる魔法の記述
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then((stream) => {
                let videoBg = document.createElement('video');
                videoBg.srcObject = stream;
                videoBg.autoplay = true;
                videoBg.playsInline = true;
                videoBg.style.position = 'fixed';
                videoBg.style.top = '0';
                videoBg.style.left = '0';
                videoBg.style.width = '100%';
                videoBg.style.height = '100%';
                videoBg.style.objectFit = 'cover';
                videoBg.style.zIndex = '-1';
                document.body.appendChild(videoBg);
            }).catch((err) => {
                console.log("カメラ起動エラー: ", err);
            });

        // ページを開いたら自動再生の待機
        video.play().catch(() => {});

        // 👆 【超スムーズ】2本指での拡大・縮小・回転プログラム
        let evHistory = [];
        let prevDiff = -1;
        let currentScale = 1.0;
        let startAngle = 0;
        let currentRotation = 0;

        overlay.addEventListener('pointerdown', (ev) => {
            evHistory.push(ev);
            if (evHistory.length === 2) {
                prevDiff = Math.hypot(evHistory[0].clientX - evHistory[1].clientX, evHistory[0].clientY - evHistory[1].clientY);
                startAngle = Math.atan2(evHistory[1].clientY - evHistory[0].clientY, evHistory[1].clientX - evHistory[0].clientX) * 180 / Math.PI;
            }
        });

        overlay.addEventListener('pointermove', (ev) => {
            for (let i = 0; i < evHistory.length; i++) {
                if (ev.pointerId === evHistory[i].pointerId) {
                    evHistory[i] = ev;
                    break;
                }
            }

            if (evHistory.length === 2) {
                // 🔍 ピンチで拡大・縮小
                const curDiff = Math.hypot(evHistory[0].clientX - evHistory[1].clientX, evHistory[0].clientY - evHistory[1].clientY);
                if (prevDiff > 0) {
                    let ratio = curDiff / prevDiff;
                    currentScale *= ratio;
                    currentScale = Math.min(Math.max(0.3, currentScale), 4.0); // 0.3倍から4倍まで対応
                    videoContainer.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                }
                prevDiff = curDiff;

                // 🔄 ねじって回転
                const curAngle = Math.atan2(evHistory[1].clientY - evHistory[0].clientY, evHistory[1].clientX - evHistory[0].clientX) * 180 / Math.PI;
                const angleDiff = curAngle - startAngle;
                currentRotation -= angleDiff;
                videoContainer.setAttribute('rotation', `0 ${currentRotation} 0`);
                startAngle = curAngle;
            }
        });

        const removePointer = (ev) => {
            for (let i = 0; i < evHistory.length; i++) {
                if (evHistory[i].pointerId === ev.pointerId) {
                    evHistory.splice(i, 1);
                    break;
                }
            }
            if (evHistory.length < 2) prevDiff = -1;
