<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <script>
        const PAGE_TITLE = "HOTEL FINE RENTAL"; 
        const BUTTON_TEXT = "カタログを開く"; 
    </script>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://threejs.org/build/three.js"></script>
    
    <style>
        #ar-link-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 0;
            background-color: #00cc66;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 999999 !important; 
            display: block !important; 
            text-decoration: none;
            font-family: sans-serif;
            text-align: center;
            width: 80%;
        }
        #ar-link-button:active {
            background-color: #009944;
        }
        #instructions {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999990;
            font-family: sans-serif;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden; touch-action: none;">

    <div id="instructions">画面をタップして動画を配置<br>2本指で拡大・縮小・回転できます</div>

    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <video id="ar-video" src="hotelfine_rentalcatalog_teaser2026.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-entity id="video-wrapper" position="0 0 -2.5" rotation="0 0 0" scale="1 1 1">
            <a-video id="ar-video-plane" src="#ar-video" width="2.4" height="1.35"></a-video>
        </a-entity>

        <a-entity camera></a-entity>
    </scene>

    <a id="ar-link-button" href="https://www.hotel-fine.co.jp/member/rental/book/#target/page_no=1" target="_blank" rel="noopener noreferrer"></a>

    <script>
        document.title = PAGE_TITLE;
        const button = document.getElementById('ar-link-button');
        button.textContent = BUTTON_TEXT;

        const video = document.getElementById('ar-video');
        const videoWrapper = document.getElementById('video-wrapper');
        const videoPlane = document.getElementById('ar-video-plane');

        // ページが開いたらすぐに動画の再生準備をする
        video.play().catch(err => { console.log("自動再生ブロック中"); });

        // --- 💡 noteの解説通りに動く、超スムーズな指操作プログラム ---
        let evHistory = [];
        let prevDiff = -1;
        let currentScale = 1.0;
        let startAngle = 0;
        let currentRotation = 0;

        window.addEventListener('pointerdown', (ev) => {
            if (ev.target.id === 'ar-link-button') return;
            evHistory.push(ev);
            if (evHistory.length === 2) {
                prevDiff = Math.hypot(evHistory[0].clientX - evHistory[1].clientX, evHistory[0].clientY - evHistory[1].clientY);
                startAngle = Math.atan2(evHistory[1].clientY - evHistory[0].clientY, evHistory[1].clientX - evHistory[0].clientX) * 180 / Math.PI;
            }
        });

        window.addEventListener('pointermove', (ev) => {
            for (let i = 0; i < evHistory.length; i++) {
                if (ev.pointerId === evHistory[i].pointerId) {
                    evHistory[i] = ev;
                    break;
                }
            }

            if (evHistory.length === 2) {
                // 🔍 ピンチイン・ピンチアウトで拡大縮小
                const curDiff = Math.hypot(evHistory[0].clientX - evHistory[1].clientX, evHistory[0].clientY - evHistory[1].clientY);
                if (prevDiff > 0) {
                    let ratio = curDiff / prevDiff;
                    currentScale *= ratio;
                    currentScale = Math.min(Math.max(0.2, currentScale), 4.0); // 0.2倍〜4倍まで拡大可能
                    videoWrapper.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                }
                prevDiff = curDiff;

                // 🔄 2本指をねじって回転
                const curAngle = Math.atan2(evHistory[1].clientY - evHistory[0].clientY, evHistory[1].clientX - evHistory[0].clientX) * 180 / Math.PI;
                const angleDiff = curAngle - startAngle;
                currentRotation -= angleDiff;
                videoWrapper.setAttribute('rotation', `0 ${currentRotation} 0`);
                startAngle = curAngle;
            }
        });

        const removePointer = (ev) => {
            for (let i = 0; i < evHistory.length; i++) {
                if (evHistory[i].pointerId === ev.pointerId) {
                    evHistory.splice(i, 1);
                    break;
                }
            }
            if (evHistory.length < 2) prevDiff = -1;
        };

        window.addEventListener('pointerup', removePointer);
        window.addEventListener('pointercancel', removePointer);

        // 画面をどこでもタップすると、動画が再生される
        window.addEventListener('click', (e) => {
            if (e.target.id !== 'ar-link-button') {
                video.play();
            }
        });
    </script>
</body>
</html>
