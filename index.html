<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    
    <script>
        const PAGE_TITLE = "HOTEL FINE RENTAL"; 
        const BUTTON_TEXT = "カタログを開く"; 
    </script>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        #ar-link-button {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 0;
            background-color: #00cc66;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 999999 !important; 
            display: block !important; 
            text-decoration: none;
            font-family: sans-serif;
            text-align: center;
            width: 80%;
        }
        #ar-link-button:active {
            background-color: #009944;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="touch-area" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; touch-action: none;"></div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <video id="ar-video" src="hotelfine_rentalcatalog_teaser2026.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <a-video id="ar-video-plane" src="#ar-video" width="2.4" height="1.35" position="0 0.1 0" rotation="-90 0 0" scale="1 1 1"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </scene>

    <a id="ar-link-button" href="https://www.hotel-fine.co.jp/member/rental/book/#target/page_no=1" target="_blank" rel="noopener noreferrer"></a>

    <script>
        document.title = PAGE_TITLE;
        const button = document.getElementById('ar-link-button');
        button.textContent = BUTTON_TEXT;

        const marker = document.getElementById('marker');
        const video = document.getElementById('ar-video');
        const videoPlane = document.getElementById('ar-video-plane');
        const touchArea = document.getElementById('touch-area');

        // --- 💡 ここから：安全に指の拡大・縮小・回転を行う最新プログラム ---
        let evHistory = [];
        let prevDiff = -1;
        let currentScale = 1.0;
        let startAngle = 0;
        let currentRotation = 0;

        touchArea.addEventListener('pointerdown', (ev) => {
            evHistory.push(ev);
            if (evHistory.length === 2) {
                prevDiff = Math.hypot(evHistory[0].clientX - evHistory[1].clientX, evHistory[0].clientY - evHistory[1].clientY);
                startAngle = Math.atan2(evHistory[1].clientY - evHistory[0].clientY, evHistory[1].clientX - evHistory[0].clientX) * 180 / Math.PI;
            }
        });

        touchArea.addEventListener('pointermove', (ev) => {
            for (let i = 0; i < evHistory.length; i++) {
                if (ev.pointerId === evHistory[i].pointerId) {
                    evHistory[i] = ev;
                    break;
                }
            }

            if (evHistory.length === 2) {
                // 🔍 拡大・縮小の計算（ピンチ）
                const curDiff = Math.hypot(evHistory[0].clientX - evHistory[1].clientX, evHistory[0].clientY - evHistory[1].clientY);
                if (prevDiff > 0) {
                    let ratio = curDiff / prevDiff;
                    currentScale *= ratio;
                    // 行き過ぎ防止の制限（0.3倍〜3倍まで）
                    currentScale = Math.min(Math.max(0.3, currentScale), 3.0);
                    videoPlane.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
                }
                prevDiff = curDiff;

                // 🔄 回転の計算（ツイスト）
                const curAngle = Math.atan2(evHistory[1].clientY - evHistory[0].clientY, evHistory[1].clientX - evHistory[0].clientX) * 180 / Math.PI;
                const angleDiff = curAngle - startAngle;
                currentRotation -= angleDiff; // 回転方向を合わせる
                videoPlane.setAttribute('rotation', `-90 ${currentRotation} 0`);
                startAngle = curAngle;
            }
        });

        const removePointer = (ev) => {
            for (let i = 0; i < evHistory.length; i++) {
                if (evHistory[i].pointerId === ev.pointerId) {
                    evHistory.splice(i, 1);
                    break;
                }
            }
            if (evHistory.length < 2) {
                prevDiff = -1;
            }
        };

        touchArea.addEventListener('pointerup', removePointer);
        touchArea.addEventListener('pointercancel', removePointer);
        touchArea.addEventListener('pointerout', removePointer);
        touchArea.addEventListener('pointerleave', removePointer);
        // --- 💡 ここまで ---

        marker.addEventListener('markerFound', () => {
            video.play().catch(err => { console.log("自動再生ブロック中"); });
        });

        marker.addEventListener('markerLost', () => {
            video.pause();
        });

        // 画面タッチで動画再生（ボタン以外）
        touchArea.addEventListener('click', (e) => {
            if (evHistory.length < 2) { // 2本指操作の時は再生処理をしない
                video.play();
            }
        });
    </script>
</body>
</html>
