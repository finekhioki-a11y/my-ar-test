<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>最先端AR印刷サンプル</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="ar-video" src="https://assets.mixkit.co/videos/preview/mixkit-playing-with-a-smartphone-in-bed-41824-large.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <a-video src="#ar-video" width="1.6" height="0.9" position="0 0 0" rotation="-90 0 0"></a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </scene>

    <script>
        const marker = document.getElementById('marker');
        const video = document.getElementById('ar-video');
        let isMarkerFound = false;

        // マーカーを検知したとき
        marker.addEventListener('markerFound', () => {
            isMarkerFound = true;
            // スマホのブロックがなければ再生
            video.play().catch(err => {
                console.log("自動再生がブロックされました。画面をタップしてください。");
            });
        });

        // マーカーが外れたとき
        marker.addEventListener('markerLost', () => {
            isMarkerFound = false;
            video.pause();
        });

        // 🔥【超重要】画面のどこかをタップしたら強制的に再生ブロックを解除する仕組み
        document.body.addEventListener('click', () => {
            // マーカーが見えている状態なら動画を再生する
            if (isMarkerFound) {
                video.play();
            } else {
                // マーカーが見えていなくても、裏で一度再生して「いつでも流せる準備」をする
                video.play().then(() => {
                    video.pause();
                });
            }
        });
    </script>
</body>
</html>
